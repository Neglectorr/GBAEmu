<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Portal – Lobbies</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
</head>
<body>
<nav class="navbar" id="navbar"></nav>
<div id="toast-container" class="toast-container"></div>

<div class="page">
  <div class="container">
    <div class="section">
      <!-- Header -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:16px;">
        <div>
          <h1 class="page-title">Game Lobbies</h1>
          <p class="page-subtitle" style="margin-bottom:0">Join a session or create your own</p>
        </div>
        <button class="btn btn-primary" id="create-lobby-btn">
          ✦ Create Lobby
        </button>
      </div>

      <!-- Active lobbies -->
      <div id="lobby-grid" class="lobby-grid">
        <div class="empty-state" id="empty-state">
          <span class="empty-state-icon">🎮</span>
          <p>No active lobbies. Be the first to create one!</p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Create Lobby Modal -->
<div class="modal-backdrop" id="create-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>✦ Create a Lobby</h3>
      <button class="modal-close" id="close-modal">✕</button>
    </div>
    <form id="create-lobby-form">
      <div class="form-group">
        <label class="form-label">Lobby Name</label>
        <input type="text" id="lobby-name" class="form-input"
               placeholder="e.g. Pokémon Trade Session" maxlength="50" required>
      </div>
      <div class="form-group">
        <label class="form-label">Select ROM</label>
        <select id="rom-select" class="form-select" required>
          <option value="">Loading ROMs…</option>
        </select>
      </div>
      <div class="form-group" id="console-type-display" style="display:none;">
        <label class="form-label">Console</label>
        <div id="console-type-badge" style="font-size:.9rem;"></div>
      </div>
      <div class="form-group" id="emulator-type-group">
        <label class="form-label">Emulator</label>
        <select id="emulator-type" class="form-select">
          <option value="auto">Auto (recommended)</option>
          <option value="emulatorjs">EmulatorJS + mGBA core</option>
        </select>
        <p style="margin-top:6px;font-size:.8rem;color:var(--text-muted);">
          All players in the lobby will use the same emulator. "Auto" uses EmulatorJS with the mGBA core.
        </p>
      </div>
      <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:24px;">
        <button type="button" class="btn btn-ghost" id="cancel-modal">Cancel</button>
        <button type="submit" class="btn btn-primary">Create Lobby</button>
      </div>
    </form>
  </div>
</div>

<script src="/js/socket.io.min.js"></script>
<script src="/js/common.js"></script>
<script src="/js/lobby.js"></script>
</body>
</html>
